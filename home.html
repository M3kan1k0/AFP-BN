<!DOCTYPE html>

<head>

<title>Home | Batang Nichols Reunion 2027</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #fff7ee;
    color: #000;
    padding-top: 70px;
}

/* MAIN NAV */
nav.main-nav {
    background: #d9715f;
    padding: 15px 20px;
    display: flex;
    justify-content: center;
    gap: 30px;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 9999;
}

nav.main-nav a {
    color: white;
    font-size: 1.1rem;
    text-decoration: none;
    font-weight: bold;
}

nav.main-nav a:hover {
    text-decoration: underline;
}

/* PAGE HEADER */
.page-header {
    text-align: center;
    padding: 80px 20px 30px;
}

.page-header h1 {
    color: #d9715f;
    margin-bottom: 10px;
}

.page-header p {
    max-width: 700px;
    margin: auto;
    font-size: 1.1rem;
}

/* BUTTONS */
button {
    padding: 15px 30px;
    font-size: 1.1rem;
    border-radius: 8px;

    margin: 10px;
    font-weight: bold;

    background: #c45f52;
    color: white;
}

#exitBtn:hover {

#rsvpBtn {
    background: #d9715f;
    color: white;

<nav class="main-nav">

<script>
function exitSite() {
    // Attempt to close tab (works in most browsers if opened via script)
    window.open('', '_self');
    window.close();

    // If close fails, redirect to an external page
    setTimeout(() => {
        window.location.href = 'https://www.google.com';
    }, 200);
}
</script>
