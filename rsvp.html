<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP & Merchandise - Batang Nichols Reunion 2027</title>

<style>
body { font-family: Arial, sans-serif; background:#fff7ee; margin:0; }
nav { background:#d9715f; padding:15px; display:flex; justify-content:center; gap:30px; }
nav a { color:white; font-weight:bold; text-decoration:none; }
.container { max-width:800px; margin:40px auto; background:#fff; padding:25px; border-radius:10px; }
label { margin-top:15px; display:block; font-weight:bold; }
input, select { width:100%; padding:10px; margin-top:5px; }
.section-title { color:#d9715f; margin-top:25px; }
.total { margin-top:15px; font-weight:bold; color:#d9715f; }
button { margin-top:25px; width:100%; padding:15px; font-size:1.2rem; background:#d9715f; color:white; border:none; border-radius:8px; cursor:pointer; }
.guest { border:1px solid #ddd; padding:15px; margin-top:10px; border-radius:6px; }
</style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="merchandise.html">Merchandise</a>
</nav>

<div class="container">
<h2 class="section-title" style="text-align:center;">RSVP & Merchandise</h2>

<form id="rsvpForm">

<label>First Name</label>
<input name="first_name" required>

<label>Last Name</label>
<input name="last_name" required>

<label>Email</label>
<input type="email" name="_replyto" required>

<p><strong>Registration Fee:</strong> $150 per person</p>

<label>Your T-Shirt Size</label>
<select name="main_shirt_size" required>
<option disabled selected>Select size</option>
<option>S</option><option>M</option><option>L</option>
<option>XL</option><option>2XL</option><option>3XL</option>
</select>

<label>Number of Guests</label>
<input type="number" id="guestCount" min="0" value="0">

<div id="guestFields"></div>

<div class="total">RSVP Total: <span id="rsvpTotal">$150</span></div>

<hr>

<h3 class="section-title">Merchandise (Optional)</h3>

<label>T-Shirt Quantity ($25)</label>
<input type="number" id="shirtQty" min="0" value="0">

<label>Hoodie Quantity ($40)</label>
<input type="number" id="hoodieQty" min="0" value="0">

<label>Cap Quantity ($15)</label>
<input type="number" id="capQty" min="0" value="0">

<div class="total">
Merchandise Total: <span id="merchTotal">$0</span><br>
Grand Total: <span id="grandTotal">$150</span>
</div>

<button type="submit" id="submitBtn">Proceed to Payment – $150</button>
</form>
</div>

<script>
const REG_FEE = 150;
const guestCount = document.getElementById("guestCount");
const guestFields = document.getElementById("guestFields");
const shirtQty = document.getElementById("shirtQty");
const hoodieQty = document.getElementById("hoodieQty");
const capQty = document.getElementById("capQty");

function updateTotals() {
    const guests = Number(guestCount.value);
    const rsvp = (1 + guests) * REG_FEE;
    const merch =
        shirtQty.value * 25 +
        hoodieQty.value * 40 +
        capQty.value * 15;

    document.getElementById("rsvpTotal").textContent = `$${rsvp}`;
    document.getElementById("merchTotal").textContent = `$${merch}`;
    document.getElementById("grandTotal").textContent = `$${rsvp + merch}`;
    document.getElementById("submitBtn").textContent = `Proceed to Payment – $${rsvp + merch}`;
}

guestCount.oninput = () => {
    guestFields.innerHTML = "";
    for (let i=1;i<=guestCount.value;i++) {
        guestFields.innerHTML += `
        <div class="guest">
            <label>Guest ${i} Name</label>
            <input name="g${i}f" placeholder="First" required>
            <input name="g${i}l" placeholder="Last" required>
            <label>T-Shirt Size</label>
            <select name="g${i}s" required>
                <option>S</option><option>M</option><option>L</option>
                <option>XL</option><option>2XL</option><option>3XL</option>
            </select>
        </div>`;
    }
    updateTotals();
};

[shirtQty, hoodieQty, capQty].forEach(el => el.oninput = updateTotals);
updateTotals();

document.getElementById("rsvpForm").onsubmit = function(e){
    e.preventDefault();

    const guests = [];
    document.querySelectorAll(".guest").forEach((g,i)=>{
        guests.push({
            first:g.querySelector("input[name^=g]").value,
            last:g.querySelectorAll("input")[1].value,
            shirt:g.querySelector("select").value
        });
    });

    const merchItems = [];
    if(shirtQty.value>0) merchItems.push(`T-Shirt x${shirtQty.value} ($${shirtQty.value*25})`);
    if(hoodieQty.value>0) merchItems.push(`Hoodie x${hoodieQty.value} ($${hoodieQty.value*40})`);
    if(capQty.value>0) merchItems.push(`Cap x${capQty.value} ($${capQty.value*15})`);

    const params = new URLSearchParams({
        first:this.first_name.value,
        last:this.last_name.value,
        email:this._replyto.value,
        shirt:this.main_shirt_size.value,
        guests:JSON.stringify(guests),
        merchItems:JSON.stringify(merchItems),
        rsvp:(1+guests.length)*150,
        merch:shirtQty.value*25+hoodieQty.value*40+capQty.value*15,
        total:(1+guests.length)*150 + shirtQty.value*25+hoodieQty.value*40+capQty.value*15
    });

    window.location.href="payment.html?"+params.toString();
};
</script>

</body>
</html>
