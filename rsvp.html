<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registration - Batang Nichols Reunion 2027</title>

<style>

body {
    font-family: Arial, sans-serif;
    background:#fff7ee;
    margin:0;
}

nav {
    background:#d9715f;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

nav a {
    color:white;
    font-weight:bold;
    text-decoration:none;
}

.container {
    max-width:800px;
    margin:40px auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
}

label {
    margin-top:15px;
    display:block;
    font-weight:bold;
}

input,
select {
    width:100%;
    padding:10px;
    margin-top:5px;
    box-sizing:border-box;
}

.section-title {
    color:#d9715f;
    margin-top:25px;
}

.note {
    margin-top:10px;
    color:#d9715f;
    font-style:italic;
}

button {
    margin-top:25px;
    width:100%;
    padding:15px;
    font-size:1.1rem;
    background:#d9715f;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover {
    background:#c45d4c;
}

.guest {
    border:1px solid #ddd;
    padding:15px;
    margin-top:15px;
    border-radius:6px;
}

</style>

</head>

<body>


<nav>

<a href="index.html">Home</a>
<a href="payment.html">Payment</a>
<a href="gallery.html">Gallery</a>
<a href="merchandise.html">Reunion Memorabilia</a>
<a href="attendees.html">Confirmed Attendees</a>

</nav>



<div class="container">


<h2 class="section-title" style="text-align:center;">
REGISTRATION
</h2>



<form
id="rsvpForm"
action="https://formspree.io/f/mvznjyly"
method="POST">



<label>
First Name
</label>

<input
type="text"
name="first_name"
required>



<label>
Last Name
</label>

<input
type="text"
name="last_name"
required>



<label>
Are you a graduate of NABES?
</label>

<select
id="nabesGraduate"
name="nabes_graduate"
required>

<option value="" disabled selected>
Select Answer
</option>

<option value="Yes">
Yes
</option>

<option value="No">
No
</option>

</select>



<div id="nabesYearDiv" style="display:none;">


<label>
What Year?
</label>

<input
type="number"
name="nabes_grad_year"
id="nabesYear"
min="1900"
max="2099"
placeholder="Enter graduation year">


</div>



<label>
Are you a graduate of PCSHS?
</label>


<select
id="pcshsGraduate"
name="pcshs_graduate"
required>

<option value="" disabled selected>
Select Answer
</option>

<option value="Yes">
Yes
</option>

<option value="No">
No
</option>

</select>



<div id="pcshsYearDiv" style="display:none;">


<label>
What Year?
</label>

<input
type="number"
name="pcshs_grad_year"
id="pcshsYear"
min="1900"
max="2099"
placeholder="Enter graduation year">


</div>



<label>
Email
</label>

<input
type="email"
name="_replyto"
required>



<label>
Your T-Shirt Size
</label>


<select
name="main_shirt_size"
required>


<option value="" disabled selected>
Select Size
</option>

<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>2XL</option>
<option>3XL</option>


</select>


<label>
Number of Guests
</label>


<input
type="number"
id="guestCount"
min="0"
value="0">



<div id="guestFields"></div>



<input
type="hidden"
name="guest_details"
id="guestDetails">



<hr>



<h3 class="section-title">
Reunion Memorabilia (Optional)
</h3>



<label>
Reunion Cap Quantity ($20)
</label>


<input
type="number"
name="reunion_cap_qty"
id="reunionCapQty"
min="0"
value="0">



<p class="note">

📌 Note: Reunion Cap orders require a minimum of 50 confirmed orders before a work order will be placed.

</p>



<input
type="hidden"
name="cap_details"
id="capDetails">



<input
type="hidden"
name="_next"
value="index.html">



<button type="submit">

SUBMIT ATTENDEE'S REGISTRATION

</button>



</form>


</div>

<script>


const guestCount =
document.getElementById("guestCount");

const guestFields =
document.getElementById("guestFields");

const rsvpForm =
document.getElementById("rsvpForm");

const capQty =
document.getElementById("reunionCapQty");



/* ===========================
   NABES GRADUATE QUESTION
=========================== */


const nabesGraduate =
document.getElementById("nabesGraduate");

const nabesYearDiv =
document.getElementById("nabesYearDiv");

const nabesYear =
document.getElementById("nabesYear");


nabesGraduate.addEventListener("change", function(){


    if(this.value === "Yes"){


        nabesYearDiv.style.display = "block";

        nabesYear.required = true;


    } else {


        nabesYearDiv.style.display = "none";

        nabesYear.required = false;

        nabesYear.value = "";


    }


});



/* ===========================
   PCSHS GRADUATE QUESTION
=========================== */


const pcshsGraduate =
document.getElementById("pcshsGraduate");

const pcshsYearDiv =
document.getElementById("pcshsYearDiv");

const pcshsYear =
document.getElementById("pcshsYear");


pcshsGraduate.addEventListener("change", function(){


    if(this.value === "Yes"){


        pcshsYearDiv.style.display = "block";

        pcshsYear.required = true;


    } else {


        pcshsYearDiv.style.display = "none";

        pcshsYear.required = false;

        pcshsYear.value = "";


    }


});



/* ===========================
   CREATE GUEST ENTRY FIELDS
=========================== */


guestCount.oninput = function(){


    guestFields.innerHTML = "";


    for(
        let i = 1;
        i <= Number(guestCount.value);
        i++
    ){


        guestFields.innerHTML += `

        <div class="guest">


            <label>
                Guest ${i} Full Name
            </label>


            <input

            type="text"

            name="guest_${i}_name"

            placeholder="Enter guest full name"

            required>


        </div>

        `;


    }


};




/* ===========================
   PREPARE FORM DATA
=========================== */


rsvpForm.onsubmit = function(){


    const guests = [];


    document
    .querySelectorAll(".guest")
    .forEach(function(guest){


        guests.push(

            guest.querySelector("input").value

        );


    });



    document
    .getElementById("guestDetails")
    .value =
    JSON.stringify(guests);




    const capQuantity =
    Number(capQty.value);



    if(capQuantity > 0){


        document
        .getElementById("capDetails")
        .value =

        "Reunion Cap Quantity: "
        +
        capQuantity
        +
        " | Total: $"
        +
        (capQuantity * 20);



    } else {


        document
        .getElementById("capDetails")
        .value =

        "No Reunion Cap ordered";


    }





    /*
       Reset form after Formspree receives submission
    */


    setTimeout(function(){


        rsvpForm.reset();


        guestFields.innerHTML = "";


        guestCount.value = 0;


        capQty.value = 0;


        nabesYearDiv.style.display = "none";


        pcshsYearDiv.style.display = "none";


    },500);



    return true;


};





/* ===========================
   CLEAR FORM WHEN RETURNING
   USING BROWSER BACK BUTTON
=========================== */


window.onpageshow = function(event){


    if(event.persisted){


        rsvpForm.reset();


        guestFields.innerHTML = "";


        guestCount.value = 0;


        capQty.value = 0;


        nabesYearDiv.style.display = "none";


        pcshsYearDiv.style.display = "none";


    }


};



</script>


</body>

</html>
